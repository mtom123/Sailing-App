name: Build & Deploy su GitHub Pages

on:
  push:
    branches:
      - main
      - claude/marine-pwa-ipad-app-p1cdy7
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Installa dipendenze
        run: npm install --no-audit --no-fund
      - name: Build di produzione
        run: npm run build
      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Carica artefatto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pubblica
        id: deployment
        uses: actions/deploy-pages@v4
