<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>TIMONE — Navigazione Marina</title>
    <meta name="description" content="PWA di navigazione marina per iPad: cartografia batimetrica, meteo marino, AIS e ancoraggi." />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TIMONE" />
    <meta name="theme-color" content="#0a1620" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-touch-fullscreen" content="yes" />

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />

    <style>
      /* Critical CSS inline per evitare FOUC e fix iOS Safari height issues */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        /* 100dvh = dynamic viewport height (iOS 16+). Fallback a 100vh, poi 100% */
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        background: #0a1620;
        -webkit-text-size-adjust: 100%;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        touch-action: manipulation;
      }
      #root {
        width: 100%;
        height: 100%;
        /* Safe area insets per iPad con notch/rounded corners */
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        box-sizing: border-box;
        overflow: hidden;
      }
      /* Prevenire il bounce scroll di iOS */
      body { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
