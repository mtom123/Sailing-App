<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>TIMONE — Navigazione Marina</title>
    <meta name="description" content="PWA di navigazione marina per iPad: cartografia batimetrica, meteo marino, AIS e ancoraggi." />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TIMONE" />
    <meta name="theme-color" content="#0a1620" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-touch-fullscreen" content="yes" />

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />

    <!-- CRITICAL POLYFILL: deve essere caricato PRIMA di qualsiasi JS -->
    <!-- Safari 15 non ha Object.hasOwnProperty come metodo statico -->
    <script>
      // Polyfill Object.hasOwnProperty ( mancante in Safari 15.0 e sotto)
      if (typeof Object.hasOwnProperty !== 'function') {
        Object.hasOwnProperty = function(obj, prop) {
          return Object.prototype.hasOwnProperty.call(obj, prop)
        }
      }
      // Polyfill Object.hasOwn ( mancante in Safari < 15.4)
      if (typeof Object.hasOwn !== 'function') {
        Object.hasOwn = function(obj, prop) {
          return Object.prototype.hasOwnProperty.call(obj, prop)
        }
      }
      // Polyfill structuredClone (mancante in Safari < 15.4)
      if (typeof structuredClone !== 'function') {
        window.structuredClone = function(obj) {
          return JSON.parse(JSON.stringify(obj))
        }
      }
      // Polyfill Array.prototype.at (mancante in Safari < 15.4)
      if (!Array.prototype.at) {
        Array.prototype.at = function(n) {
          n = Math.trunc(n) || 0
          if (n < 0) n += this.length
          if (n < 0 || n >= this.length) return undefined
          return this[n]
        }
      }
      // Polyfill String.prototype.replaceAll (mancante in Safari < 13.1)
      if (!String.prototype.replaceAll) {
        String.prototype.replaceAll = function(str, newStr) {
          if (Object.prototype.toString.call(str).toLowerCase() === '[object regexp]') {
            return this.replace(str, newStr)
          }
          return this.replace(new RegExp(str, 'g'), newStr)
        }
      }
      // Polyfill Promise.any (mancante in Safari < 15)
      if (typeof Promise.any !== 'function') {
        Promise.any = function(promises) {
          return new Promise((resolve, reject) => {
            const errors = []
            let remaining = promises.length
            if (remaining === 0) {
              reject(new AggregateError([], 'All promises were rejected'))
              return
            }
            promises.forEach((p, i) => {
              Promise.resolve(p).then(
                (val) => resolve(val),
                (err) => {
                  errors[i] = err
                  if (--remaining === 0) {
                    reject(new AggregateError(errors, 'All promises were rejected'))
                  }
                }
              )
            })
          })
        }
        if (typeof AggregateError === 'undefined') {
          window.AggregateError = function(errors, message) {
            const e = new Error(message)
            e.errors = errors
            return e
          }
        }
      }
      // Capture early errors before main JS loads
      window.addEventListener('error', (e) => {
        console.error('[EARLY ERROR]', e.message, e.filename, e.lineno)
      })

      // UNREGISTER ANY OLD SERVICE WORKERS BEFORE APP LOADS
      // Questo fixa il problema del vecchio SW che serve cache obsoleta
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var i = 0; i < registrations.length; i++) {
            var r = registrations[i]
            // Unregister se è il vecchio service-worker.js (non il nuovo sw.js)
            if (r.active && r.active.scriptURL.indexOf('service-worker.js') !== -1) {
              console.log('[BOOT] Unregistering old SW:', r.active.scriptURL)
              r.unregister()
            }
          }
        }).catch(function(e) {
          console.warn('[BOOT] SW unregister error:', e)
        })
        // Also clear ALL caches on first load dopo update
        if (window.location.search.indexOf('v=') !== -1) {
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(k) {
                if (k.indexOf('v3.0') === -1) {
                  console.log('[BOOT] Deleting old cache:', k)
                  caches.delete(k)
                }
              })
            })
          }
        }
      }
    </script>

    <style>
      /* Critical CSS inline per evitare FOUC e fix iOS Safari height issues */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        background: #0a1620;
        -webkit-text-size-adjust: 100%;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        touch-action: manipulation;
      }
      #root {
        width: 100%;
        height: 100%;
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        box-sizing: border-box;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
      }
      body { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }

      /* Loading screen — visibile finché React non si monta */
      #app-loading {
        position: fixed;
        inset: 0;
        background: #0a1620;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
        padding: 20px;
        text-align: center;
      }
      #app-loading .logo {
        color: #5ee6c8;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 4px;
        font-family: -apple-system, system-ui, sans-serif;
        margin-bottom: 4px;
      }
      #app-loading .sub {
        color: #8fa0ae;
        font-size: 11px;
        letter-spacing: 1.5px;
        font-family: -apple-system, system-ui, sans-serif;
        margin-bottom: 32px;
        text-transform: uppercase;
      }
      #app-loading .spinner {
        width: 32px;
        height: 32px;
        border: 2px solid #1f3a4d;
        border-top-color: #5ee6c8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #app-loading .hint {
        margin-top: 24px;
        color: #5d6e7a;
        font-size: 11px;
        font-family: -apple-system, system-ui, sans-serif;
        max-width: 320px;
        line-height: 1.4;
      }
      #app-loading .hint a {
        color: #5ee6c8;
        text-decoration: underline;
        display: inline-block;
        margin-top: 8px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Fallback noscript */
      .noscript-fallback {
        position: fixed;
        inset: 0;
        background: #0a1620;
        color: #e8f0f5;
        padding: 20px;
        font-family: -apple-system, system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <div class="logo">TIMONE</div>
      <div class="sub">Marine Navigation</div>
      <div class="spinner"></div>
      <div class="hint" id="loading-hint">
        Caricamento… Se l'app non si avvia entro 10 secondi,
        <a href="./diagnostic.html">apri la pagina diagnostica</a>
      </div>
    </div>
    <div id="root"></div>
    <noscript>
      <div class="noscript-fallback">
        <div>
          <h1 style="color: #5ee6c8; margin-bottom: 12px;">TIMONE richiede JavaScript</h1>
          <p style="color: #8fa0ae;">Abilita JavaScript nelle impostazioni del browser.</p>
          <p style="margin-top: 16px;"><a href="./diagnostic.html" style="color: #5ee6c8;">Apri diagnostica</a></p>
        </div>
      </div>
    </noscript>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
